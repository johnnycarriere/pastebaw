name: Scheduled Cleanup

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup expired pastes
        env:
          DUSTEBIN_URL: ${{ secrets.DUSTEBIN_URL }}
          CLEANUP_API_KEY: ${{ secrets.CLEANUP_API_KEY }}
        run: |
          set -e

          if [ -z "$DUSTEBIN_URL" ]; then
            echo "DUSTEBIN_URL is missing"
            exit 1
          fi

          if [ -z "$CLEANUP_API_KEY" ]; then
            echo "CLEANUP_API_KEY is missing"
            exit 1
          fi

          echo "Calling cleanup endpoint..."

          curl --fail --show-error --silent \
            -X POST "${DUSTEBIN_URL}/api/admin/cleanup" \
            -H "Authorization: Bearer ${CLEANUP_API_KEY}" \
            -H "Content-Type: application/json"
